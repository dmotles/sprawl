version: v2
# Opt-in TypeScript (connect-es v1) generation for the SPA: emits
# web/gen/hub/v1/hub_pb.ts (messages) + hub_connect.ts (HubService client). The
# committed output IS the SPA's client contract (QUM-878 replaced the former
# hub_pb.stub.ts seam). Requires the npm tools protoc-gen-es and
# protoc-gen-connect-es on PATH — they live in web/node_modules after `npm ci`,
# so run via `make hub-web` (which augments PATH) rather than bare `buf`. This
# template is intentionally kept out of the default `buf generate` flow
# (buf.gen.yaml) so `make validate`/`make build` never depend on a node
# toolchain — the generated TS + the built web/dist are committed. `clean` is
# left off so a node-less checkout keeps the committed web/gen.
plugins:
  - local: protoc-gen-es
    out: web/gen
    opt: target=ts
  - local: protoc-gen-connect-es
    out: web/gen
    opt: target=ts
