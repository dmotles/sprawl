validate: make validate
worktree.setup: 'if [ -f "$SPRAWL_ROOT/CLAUDE.local.md" ]; then cp "$SPRAWL_ROOT/CLAUDE.local.md" "$PWD/"; else echo "FYI: no CLAUDE.local.md found in $SPRAWL_ROOT — agents may lack workspace-specific config" >&2; fi; if [ -f "$SPRAWL_ROOT/.env" ]; then cp -p "$SPRAWL_ROOT/.env" "$PWD/"; fi; if [ -f "$SPRAWL_ROOT/scripts/pre-commit" ]; then ln -sf "$SPRAWL_ROOT/scripts/pre-commit" "$(git rev-parse --git-common-dir)/hooks/pre-commit" && chmod +x "$SPRAWL_ROOT/scripts/pre-commit" || echo "FYI: failed to install QUM-808 commit guard hook — run make hooks in $SPRAWL_ROOT" >&2; fi; if [ -f "$SPRAWL_ROOT/scripts/guard-main-ref" ]; then ln -sf "$SPRAWL_ROOT/scripts/guard-main-ref" "$(git rev-parse --git-common-dir)/hooks/reference-transaction" && chmod +x "$SPRAWL_ROOT/scripts/guard-main-ref" || echo "FYI: failed to install QUM-837 main-ref guard hook — run make hooks in $SPRAWL_ROOT" >&2; fi'
worktree.teardown: ""
